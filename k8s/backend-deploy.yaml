apiVersion: apps/v1
kind: Deployment
metadata:
  name: siem-backend
  namespace: siem-dev
  labels:
    app: siem-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: siem-backend
  template:
    metadata:
      labels:
        app: siem-backend
    spec:
      # 1. 配置私有镜像库（GHCR）的拉取凭证
      imagePullSecrets:
        - name: aliyun-acr-secret
      
      # 2. 初始化容器：确保数据库 Ready 后再启动 Django
      # 这能避免 Django 启动太快找不到数据库而崩溃重启
      containers:
      - name: django
        # 注意：这里的 tag 会由你的 GitHub Action 自动修改为 release tag
        image: seclink-siem-cr-registry.cn-hangzhou.cr.aliyuncs.com/siem/siem-backend:latest
        imagePullPolicy: IfNotPresent
        
        # 3. 环境变量配置：与你的 Django settings.py 中的数据库配置相匹配
        env:
        - name: POSTGRES_DB
          value: "siem"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: POSTGRES_HOST
          value: "db"
        - name: POSTGRES_PORT
          value: "5432"
        # 生产环境建议关闭 DEBUG
        - name: DEBUG
          value: "False"

        ports:
        - containerPort: 8000
          name: http

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: siem-dev
spec:
  type: ClusterIP
  selector:
    app: siem-backend
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
