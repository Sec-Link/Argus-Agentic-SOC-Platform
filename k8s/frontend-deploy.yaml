apiVersion: apps/v1
kind: Deployment
metadata:
  name: siem-frontend
  namespace: siem-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: siem-frontend
  template:
    metadata:
      labels:
        app: siem-frontend
    spec:
      imagePullSecrets:
        - name: aliyun-acr-secret
      containers:
      - name: nextjs
        image: seclink-siem-cr-registry.cn-hangzhou.cr.aliyuncs.com/siem/siem-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: BACKEND_ORIGIN
          value: "http://siem-backend:80"
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: siem-frontend
  namespace: siem-dev
  annotations:
    # 阿里云 CLB 自动创建公网负载均衡
    service.beta.kubernetes.io/alicloud-loadbalancer-address-type: "internet"
    service.beta.kubernetes.io/alicloud-loadbalancer-spec: "slb.s1.small"
spec:
  type: LoadBalancer
  selector:
    app: siem-frontend
  ports:
  - port: 80
    targetPort: 3000